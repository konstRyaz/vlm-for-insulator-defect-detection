defaults:
  - writer: disabled
  - _self_

seed: 42
device: auto

train_output_dir: outputs/train
run_name: detector_baseline

train_dir: data/processed/train
val_dir: data/processed/val
test_dir: data/processed/test

num_classes: 2
learning_rate: 0.0005
epochs: 2
image_size: 512
resize: true
resize_mode: pad
batch_size: 2
num_workers: 0
weight_decay: 0.0005
lr_step_size: 5
lr_gamma: 0.1
score_threshold: 0.05
pretrained: false

save_every: 1
vis_samples: 8

class_names:
  "1": defect

hydra:
  run:
    dir: .
  output_subdir: null
