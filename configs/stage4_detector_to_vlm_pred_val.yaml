version: 1
name: stage4_detector_to_vlm_pred_val_v1

stage4:
  run_name: stage4_detector_to_vlm_pred_val_v1
  split: val
  output_root: outputs/stage4

detector:
  experiment: detector_baseline
  input_dir: data/processed/val/images
  config_path: src/configs/infer.yaml
  weights_path: outputs/train/detector_baseline/best.pth
  conf_threshold: 0.3
  iou_threshold: 0.5
  max_detections_per_image: 100
  vis_samples: 8
  device: auto

crop_export:
  coco_json: data/processed/val/annotations.json
  images_dir: data/processed/val/images
  include_categories:
    - insulator_ok
    - defect_flashover
    - defect_broken
    - unknown
  padding_ratio: 0.15
  manifest_name: pred_manifest.jsonl
  summary_name: pred_manifest_summary.json
  limit: null

vlm:
  backend_mode: qwen_hf
  model_id: Qwen/Qwen2.5-VL-3B-Instruct
  prompt_version: qwen_vlm_labels_v1_prompt_v6d_balanced_notaglock
  stage3_runner_config: configs/pipeline/stage3_vlm_gt_baseline.yaml
  run_id: stage4_pred_vlm

analysis:
  ground_truth_jsonl: outputs/stage3_regrouped_v2/val/vlm_labels_v1_val_v2.annotated.jsonl
  ceiling_run_dir: outputs/stage3_vlm_baseline_runs/stage3_qwen_val_v2_kaggle
  match_iou_threshold: 0.5
  good_crop_iou_threshold: 0.7
